<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>致杜晓瑶女王殿下</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Pinyon+Script&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --baroque-pink: #f8bbd0;
            --rose-gold: #d4af37;
            --ivory: #fffafb;
            --deep-rose: #ad1457;
            --elegant-brown: #5d4037;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--baroque-pink);
            /* 巴洛克风格背景：蕾丝纹理感 */
            background-image: radial-gradient(var(--ivory) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            color: var(--elegant-brown);
            font-family: 'Noto Serif SC', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 背景音乐按钮样式 */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--rose-gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 封面页 (First Section) */
        .full-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: var(--deep-rose);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .cover-subtitle {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--elegant-brown);
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* 巴洛克精致相框 */
        .baroque-frame {
            position: relative;
            padding: 12px;
            background: var(--ivory);
            border: 2px solid var(--rose-gold);
            box-shadow: 
                0 0 0 4px var(--ivory),
                0 0 0 6px var(--rose-gold),
                0 20px 40px rgba(0,0,0,0.2);
            max-width: 280px;
            margin: 20px auto;
        }

        .baroque-frame::before, .baroque-frame::after {
            content: "❧";
            position: absolute;
            font-size: 2rem;
            color: var(--rose-gold);
        }
        .baroque-frame::before { top: -20px; left: -10px; transform: rotate(-45deg); }
        .baroque-frame::after { bottom: -20px; right: -10px; transform: rotate(135deg); }

        .baroque-frame img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* 滑动后的图文布局 */
        .content-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 25px;
            gap: 30px;
        }

        .text-block {
            font-size: 1.2rem;
            line-height: 2;
            color: var(--deep-rose);
            font-family: 'Noto Serif SC', serif;
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }

        /* 尾页 */
        .footer-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .final-wish {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3rem;
            color: var(--deep-rose);
            text-shadow: 2px 2px 0px #fff;
        }

        /* 固定底部签名 */
        .fixed-signature {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Pinyon Script', cursive;
            font-size: 1.5rem;
            color: var(--deep-rose);
            z-index: 100;
            pointer-events: none;
            text-shadow: 1px 1px 2px white;
        }

        /* 装饰性藤蔓 */
        .vines {
            font-family: 'Pinyon Script', cursive;
            color: var(--rose-gold);
            font-size: 2rem;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .baroque-frame { max-width: 240px; }
        }
    </style>
</head>
<body>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">♫</span>
    </div>
    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Chopin-Nocturne-op.9-No.2.mp3" type="audio/mpeg">
    </audio>

    <section class="full-page">
        <div class="vines">✨</div>
        <h1>尊敬的杜晓瑶女王殿下</h1>
        <p class="cover-subtitle">
            全世界最好的女孩，<br>
            母亲节快乐
        </p>
        <div class="baroque-frame">
            <img src="photo1.jpg" alt="妈妈的照片1">
        </div>
        <div class="vines" style="margin-top: 40px;">Scroll down</div>
    </section>

    <section class="content-section">
        <div class="baroque-frame">
            <img src="photo2.jpg" alt="妈妈的照片2">
        </div>
        <div class="text-block">
            因为有你，我在这个世界上得到了第一份，也是最好的一份爱。
        </div>
    </section>

    <section class="content-section">
        <div class="text-block">
            天然的纽带把我们紧紧绑在一起，我们将永远共享幸福的能量。
        </div>
        <div class="baroque-frame">
            <img src="photo3.jpg" alt="妈妈的照片3">
        </div>
    </section>

    <section class="footer-section">
        <div class="vines">❦</div>
        <h2 class="final-wish">母亲节快乐</h2>
        <p style="margin-top: 20px; color: var(--rose-gold);">Forever Your Girl/Boy</p>
    </section>

    <div class="fixed-signature">
        From Beibei · 来自贝贝
    </div>

    <script>
        // 音乐播放控制逻辑
        const music = document.getElementById('bg-music');
        const icon = document.getElementById('music-icon');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                icon.innerText = "♫";
            } else {
                music.play();
                icon.innerText = "❤";
            }
            isPlaying = !isPlaying;
        }

        // 自动播放提示：现代浏览器需要用户交互后才能播放音频
        window.addEventListener('click', () => {
            if(!isPlaying) {
                // 如果你希望用户第一次点击页面任何地方就自动播放，可以取消下面注释
                // toggleMusic();
            }
        }, {once: true});
    </script>
</body>
</html>

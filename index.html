<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>致杜晓瑶女王殿下</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Pinyon+Script&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --baroque-pink: #fce4ec;
            --royal-gold: #d4af37;
            --ivory: #fffafb;
            --deep-rose: #ad1457;
            --soft-brown: #6d4c41;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--baroque-pink);
            background-image: radial-gradient(var(--ivory) 1px, transparent 1px);
            background-size: 25px 25px;
            color: var(--soft-brown);
            font-family: 'Noto Serif SC', serif;
            scroll-behavior: smooth;
        }

        /* 音乐播放控制 */
        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid var(--royal-gold);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 统一的巴洛克相框 */
        .mural-wrapper {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            position: relative;
            padding: 12px;
            background: var(--ivory);
            border: 2.5px solid var(--royal-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .mural-wrapper::before {
            content: "❦";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--baroque-pink);
            padding: 0 10px;
            color: var(--royal-gold);
            font-size: 1.5rem;
        }

        /* 滑动相册 */
        .slider-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            gap: 10px;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-container img {
            flex: 0 0 100%;
            width: 100%;
            height: 400px;
            object-fit: cover;
            scroll-snap-align: start;
        }

        /* 封面 */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.2rem;
            color: var(--deep-rose);
            margin-bottom: 10px;
        }

        .cover-text { font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6; }

        /* 内容行 */
        .content-row {
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .text-card {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: center;
            padding: 20px;
            max-width: 300px;
            background: rgba(255,255,255,0.4);
            border-radius: 15px;
        }

        /* 视频位 */
        .video-section { padding: 60px 20px; text-align: center; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }

        /* 页脚 */
        .final-footer {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 固定签名 */
        .fixed-sig {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-family: 'Pinyon Script', cursive;
            font-size: 1.3rem;
            color: var(--deep-rose);
            z-index: 1000;
            pointer-events: none;
            text-shadow: 1px 1px 2px white;
        }

        .hint { font-size: 0.7rem; color: var(--royal-gold); margin-top: 8px; letter-spacing: 1px; }
        .vines { color: var(--royal-gold); font-size: 1.5rem; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="music-btn" onclick="toggleMusic()">
        <span id="music-icon">♫</span>
    </div>
   <audio id="bg-music" loop>
    <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <section class="hero-section">
        <div class="vines">✨</div>
        <h1>尊敬的杜晓瑶女王殿下</h1>
        <p class="cover-text">全世界最好的女孩，<br>母亲节快乐</p>
        <div class="mural-wrapper">
            <img src="p1.jpg" style="width:100%; height:380px; object-fit:cover;">
        </div>
        <div class="vines">❧</div>
    </section>

    <section class="content-row">
        <div class="mural-wrapper">
            <div class="slider-container">
                <img src="p2.jpg"> <img src="p3.jpg">
            </div>
            <p class="hint">左右滑动 ⟷</p>
        </div>
        <div class="text-card">
            因为有你，我在这个世界上得到了第一份，也是最好的一份爱。
        </div>
    </section>

    <section class="content-row">
        <div class="text-card">
            天然的纽带把我们紧紧绑在一起，我们将永远共享幸福的能量。
        </div>
        <div class="mural-wrapper">
            <div class="slider-container">
                <img src="p4.jpg"> <img src="p5.jpg">
            </div>
            <p class="hint">左右滑动 ⟷</p>
        </div>
    </section>

    <section class="content-row">
        <div class="mural-wrapper">
            <img src="p6.jpg" style="width:100%; height:380px; object-fit:cover;">
        </div>
        <p style="color:var(--royal-gold); font-style:italic;">时光漫步，爱在身边</p>
    </section>

    <section class="video-section">
        <div class="vines">✧ 我想说 ✧</div>
        <div class="mural-wrapper">
            <video class="video-box" controls playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </section>

    <section class="final-footer">
        <div class="vines">❦</div>
        <h2 style="font-family:'Ma Shan Zheng'; font-size:3rem; color:var(--deep-rose);">母亲节快乐</h2>
        <div class="vines">❦</div>
    </section>

    <div class="fixed-sig">
        From Beibei · 来自贝贝
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const icon = document.getElementById('music-icon');
        let playing = false;
        function toggleMusic() {
            if (playing) { audio.pause(); icon.innerText = "♫"; } 
            else { audio.play(); icon.innerText = "❤"; }
            playing = !playing;
        }
    </script>
</body>
</html>
